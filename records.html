<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>通報紀錄</title>
  <style>
    :root{
      --bg:#f6deb2;
      --top:#f0d9a6;
      --card:#fff6e8;
      --text:#3a2a1d;
      --muted:rgba(58,42,29,.68);
      --line:rgba(58,42,29,.12);
      --shadow:0 6px 18px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .top{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      background:var(--top);
      position:sticky;
      top:0;
      z-index:5;
      box-shadow:0 2px 10px rgba(0,0,0,.05);
    }

    .back{
      font-size:26px;
      background:transparent;
      border:0;
      cursor:pointer;
      color:var(--text);
    }

    h2{
      margin:0;
      flex:1;
      text-align:center;
      font-size:20px;
    }

    .wrap{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .empty{
      background:var(--card);
      border-radius:var(--radius);
      padding:22px 16px;
      text-align:center;
      box-shadow:var(--shadow);
      color:var(--muted);
      font-weight:700;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.5);
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .title{
      font-size:18px;
      font-weight:900;
      line-height:1.35;
      margin-bottom:6px;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .tag{
      padding:8px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
    }

    .tag.low{
      background:#bcd8bf;
      color:#203323;
    }

    .tag.medium{
      background:#f1d98d;
      color:#4e3a00;
    }

    .tag.high{
      background:#df8b7c;
      color:#4b130b;
    }

    .status{
      display:inline-block;
      margin-top:10px;
      font-weight:900;
      font-size:13px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(58,42,29,.08);
    }

    .section{
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:6px;
    }

    .value{
      font-size:14px;
      line-height:1.7;
      font-weight:700;
      word-break:break-word;
    }

    .dispatch{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.66);
      border:1px solid rgba(58,42,29,.08);
      font-weight:900;
      line-height:1.5;
    }

    .loc-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-top:4px;
    }

    .loc-left{
      flex:1;
      min-width:0;
    }

    .loc-line{
      display:flex;
      gap:6px;
      align-items:baseline;
      flex-wrap:wrap;
    }

    .loc-label{
      font-weight:900;
      font-size:13px;
      color:var(--muted);
    }

    .loc-primary{
      font-weight:800;
      word-break:break-word;
      line-height:1.6;
    }

    .map-btn{
      flex:0 0 auto;
      text-decoration:none;
      font-weight:900;
      font-size:12px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
      color:var(--text);
      border:1px solid rgba(58,42,29,.16);
      box-shadow:0 4px 10px rgba(0,0,0,.06);
    }

    .map-btn:hover{
      transform:translateY(-1px);
    }

    .summary{
      white-space:pre-wrap;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .meta-box{
      background:rgba(255,255,255,.58);
      border-radius:14px;
      padding:10px 12px;
    }

    .meta-box .k{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:4px;
    }

    .meta-box .v{
      font-size:14px;
      font-weight:900;
      line-height:1.5;
      word-break:break-word;
    }

    @media (max-width: 560px){
      .meta-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <button class="back" onclick="history.back()">←</button>
    <h2>通報紀錄</h2>
    <div style="width:28px"></div>
  </div>

  <div class="wrap" id="list">
    <div class="empty">載入中…</div>
  </div>

  <script src="records.js"></script>
</body>
</html>
