name: ecare_flutter
description: Flutter client for the E-CARE emergency assistant.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.6.0
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  http_parser: ^4.1.2
  mime: ^2.0.0
  permission_handler: ^11.4.0
  record: ^6.2.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
