<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>E-CARE 智慧緊急報案系統</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C95A4A" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app">

    <!-- Header -->
    <header class="top">
      <h1 class="brand">E-CARE</h1>
      <p class="subtitle">智慧緊急報案系統</p>
      <p id="welcomeText" class="muted" style="margin-top:8px;"></p>
    </header>

    <!-- Emergency button -->
    <section class="emergency-card">
      <button id="holdBtn" class="emergency-btn" type="button" aria-label="緊急撥打 長按3秒">
        <div class="emg-left" aria-hidden="true">🚨</div>
        <div class="emg-text">
          <div class="emg-title">緊急撥打</div>
          <div class="emg-sub">（長按 3 秒）</div>
        </div>

        <div class="emg-progress" aria-hidden="true">
          <div id="progressBar" class="emg-bar"></div>
        </div>
        <div id="holdHint" class="emg-hint">長按以啟動緊急流程</div>
      </button>
    </section>

    <!-- Main menu -->
    <section class="menu">
      <!-- ✅ 進入 E-CARE 對話頁 -->
      <button id="goEcare" class="big-tile" type="button">
        <span class="tile-ico">🤖</span>
        <span class="tile-text">E-CARE</span>
      </button>

      <!-- ✅ 通報紀錄 -->
      <button id="goHistory" class="list-item" type="button">
        <span class="li-ico">📄</span>
        <span class="li-text">通報紀錄</span>
        <span class="li-arrow">➡️</span>
      </button>

      <button class="list-item" onclick="location.href='profile.html'">
        <span class="li-ico">👤</span>
        <span class="li-text">個人資料</span>
        <span class="li-arrow">›</span>
      </button>
 
      <!-- ✅（可選）JS 壞掉時的備援連結：不想要可以刪掉這段 -->
      <noscript>
        <div class="list-item" style="margin-top:10px; opacity:.9;">
          <span class="li-text">
            你的瀏覽器未啟用 JavaScript，請改用：
            <a href="ecare.html">E-CARE</a> /
            <a href="records.html">通報紀錄</a>
          </span>
        </div>
      </noscript>
    </section>

    <!-- Status -->
    <section class="status-card">
      <div class="kv">
        <div class="k">定位</div>
        <div class="v mono" id="locText">未啟用</div>

        <div class="k">狀態</div>
        <div class="v" id="statusText">待命</div>
      </div>

      <!-- ✅ 不再用 pre / {}，改成提示區（內容由 app.js 初始化塞入） -->
      <div id="resultBox" class="result"></div>
    </section>

    <footer class="footer">
      <span class="muted">📌 手機 Chrome/Safari 開啟後可加入主畫面安裝為 App</span>
    </footer>
  </main>

  <!-- ✅ app.js 會負責導頁、長按、定位狀態、提示文字 -->
  <script>
  const storedProfile = localStorage.getItem("ecare_user_profile");

  if (!storedProfile) {
    window.location.href = "profile.html";
  } else {
    try {
      const profile = JSON.parse(storedProfile);
      const welcomeText = document.getElementById("welcomeText");
      if (welcomeText && profile.name) {
        welcomeText.textContent = `您好，${profile.name} 👋`;
      }
    } catch (e) {
      console.error("讀取使用者資料失敗：", e);
      window.location.href = "profile.html";
    }
  }
</script>
<script src="app.js"></script>
</body>
</html>
