<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>E-CARE 使用者資料</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <h1 class="brand">E-CARE</h1>
      <p class="subtitle">使用者基本資料填寫</p>
    </header>

    <section class="card">
      <div class="card-head">
        <div class="card-icon">📝</div>
        <div>
          <h2>請先填寫基本資料</h2>
          <p>填寫完成後即可進入系統首頁，報案時可自動帶入必要資訊。</p>
        </div>
      </div>

      <form id="profileForm" class="form">
        <div class="field">
          <label for="name">姓名 <span class="req">*</span></label>
          <input id="name" name="name" type="text" placeholder="請輸入姓名" required />
        </div>

        <div class="field">
          <label for="phone">電話 <span class="req">*</span></label>
          <input id="phone" name="phone" type="tel" placeholder="請輸入手機號碼" required />
        </div>

        <div class="field">
          <label for="gender">性別</label>
          <select id="gender" name="gender">
            <option value="">請選擇</option>
            <option value="女">女</option>
            <option value="男">男</option>
          </select>
        </div>

        <div class="field">
          <label for="age">年齡</label>
          <input id="age" name="age" type="number" min="0" max="120" placeholder="請輸入年齡" />
        </div>

        <div class="field">
          <label for="emergencyName">緊急聯絡人姓名</label>
          <input id="emergencyName" name="emergencyName" type="text" placeholder="請輸入緊急聯絡人姓名" />
        </div>

        <div class="field">
          <label for="emergencyPhone">緊急聯絡人電話</label>
          <input id="emergencyPhone" name="emergencyPhone" type="tel" placeholder="請輸入緊急聯絡人電話" />
        </div>

        <div class="field">
          <label for="relationship">關係</label>
          <input id="relationship" name="relationship" type="text" placeholder="例如：母親、父親、朋友" />
        </div>

        <div class="field">
          <label for="address">地址</label>
          <textarea id="address" name="address" rows="3" placeholder="例如：屏東縣內埔鄉學府路1號"></textarea>
        </div>

        <div class="field">
          <label for="note">特殊狀況 / 備註</label>
          <textarea id="note" name="note" rows="3" placeholder="例如：氣喘、心臟病、行動不便等（可不填）"></textarea>
        </div>

        <div id="formMsg" class="form-msg"></div>

        <div class="actions">
          <button type="submit" class="btn primary">儲存並進入系統</button>
        </div>
      </form>
    </section>
  </main>

  <script src="profile.js"></script>
</body>
</html>
